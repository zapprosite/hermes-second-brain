services:
  api:
    build: .
    ports:
      - "8642:8642"
    env_file:
      - /srv/monorepo/.env
    environment:
      - MEM0_BACKEND=qdrant
      - MEM0_QDRANT_URL=http://qdrant:6333
      - MEM0_QDRANT_COLLECTION=will
      - MEM0_OLLAMA_URL=http://host.docker.internal:11434
      - MEM0_OLLAMA_MODEL=qwen2.5:3b
      - MEM0_TASKS_DB_PATH=/srv/data/librarian/tasks.db
    volumes:
      - /srv/data/librarian:/srv/data/librarian
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /tank/qdrant:/qdrant/storage
    env_file:
      - /srv/monorepo/.env
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    restart: unless-stopped
